# ============================================================
# Systemd timer setup
# ============================================================
# Copy files to /etc/systemd/system/, then:
#
#   sudo systemctl daemon-reload
#   sudo systemctl enable --now graylog-summary.timer
#   sudo systemctl status graylog-summary.timer
#
# Manual test:
#   sudo systemctl start graylog-summary.service
#   journalctl -u graylog-summary.service -f


# ── /etc/systemd/system/graylog-summary.service ──────────────
[Unit]
Description=Graylog AI Log Summary
After=network-online.target
Wants=network-online.target

[Service]
Type=oneshot
User=nobody                          # Change if needed
WorkingDirectory=/opt/graylog-summary
# Use system Python (install deps: pip3 install -r requirements.txt). Or use venv:
# ExecStart=/opt/graylog-summary/.venv/bin/python /opt/graylog-summary/log_summary.py --config /opt/graylog-summary/config.yaml
ExecStart=/usr/bin/python3 /opt/graylog-summary/log_summary.py --config /opt/graylog-summary/config.yaml
StandardOutput=journal
StandardError=journal
# Ollama can take several minutes; default 90s would kill the job
TimeoutStartSec=600

# Security hardening (optional but recommended)
NoNewPrivileges=true
PrivateTmp=true
ProtectSystem=strict
ReadWritePaths=/opt/graylog-summary


# ── /etc/systemd/system/graylog-summary.timer ────────────────
[Unit]
Description=Daily Graylog AI Summary
Requires=graylog-summary.service

[Timer]
# Daily at 07:00 (summary ready in the morning; adjust if needed, e.g. 06:00 or 08:00)
OnCalendar=*-*-* 07:00:00
# Run after missed start (e.g. server was down)
Persistent=true

[Install]
WantedBy=timers.target


# ============================================================
# Alternative: cron (if systemd not desired)
# ============================================================
# crontab -e
#
# Daily at 07:00:
# 0 7 * * * /usr/bin/python3 /opt/graylog-summary/log_summary.py >> /var/log/graylog-summary.log 2>&1
